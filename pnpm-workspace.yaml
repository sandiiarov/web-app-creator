# ── @mastra/core patch (LOAD-BEARING) ──────────────────────────────────────
# patches/@mastra__core@1.47.0.patch fixes streamed tool arguments in Mastra's
# actual OpenRouter ESM + CommonJS adapters (and retains the older generic
# OpenAI-compatible safeguard). It buffers arguments until stream completion,
# replaces GLM-5.2's initial `{}` placeholder when the real cumulative JSON
# arrives, and errors on incomplete final JSON instead of coercing it to `{}`.
# Without it, edit/read/screenshot calls can execute with empty arguments.
#
# Upgrade safety: pnpm FAILS the install if this patch's context changes or if
# @mastra/core moves off 1.47.0, so it can't silently disappear. On any
# @mastra/core bump: (1) regenerate the patch against the new dist,
# (2) run the fragmented-stream regression test plus a real GLM-5.2 read→edit
# smoke, (3) check whether upstream OpenRouter now buffers and validates final
# tool arguments — if so, retire this patch.
patchedDependencies:
  '@mastra/core@1.47.0': patches/@mastra__core@1.47.0.patch
